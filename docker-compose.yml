services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env  
    volumes:
      - .:/app
    command: python -m backend.main

  frontend:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
    volumes:
      - .:/app
    depends_on:
      - backend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0